name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        # NO_COLOR keeps Typer/Rich help output plain. With colour enabled, Rich
        # injects ANSI escapes inside option tokens (e.g. "--vault"), which
        # breaks the CLI help assertions.
        env:
          NO_COLOR: "1"
          TERM: dumb
        run: pytest -q
